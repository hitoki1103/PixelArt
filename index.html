<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ドット絵エディタ</title>
<link rel="icon" href="images/pixel-art_icon.png" type="image/png">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ヘッダー -->
<header>
  <h1>ドット絵エディタ</h1>
  <div class="header-sep"></div>
  <button id="btn-undo" disabled title="Ctrl+Z">↩ <span class="hide-mobile">元に戻す</span></button>
  <button id="btn-clear" class="danger">クリア</button>
  <button id="btn-download" class="primary">↓ <span class="hide-mobile">PNG</span>保存</button>
</header>

<!-- メイン -->
<div class="app">

  <!-- 左パネル -->
  <div class="panel" id="panel">

    <!-- ツール -->
    <div class="panel-section">
      <div class="panel-label">ツール</div>
      <div class="tool-grid">
        <button class="tool-btn active" data-tool="pen">✏️ ペン</button>
        <button class="tool-btn" data-tool="fill">🪣 塗り潰し</button>
        <button class="tool-btn" data-tool="erase">🧹 消しゴム</button>
        <button class="tool-btn" data-tool="pick">💉 スポイト</button>
      </div>
    </div>

    <!-- 描画スタイル -->
    <div class="panel-section" id="draw-style-section">
      <div class="panel-label">描画スタイル</div>
      <div class="tool-grid">
        <button class="style-btn active" data-style="normal">通常</button>
        <button class="style-btn" data-style="col">縦</button>
        <button class="style-btn" data-style="row">横</button>
      </div>
      <label class="detect-line-label" id="detect-line-label" style="display:none;">
        <input type="checkbox" id="detect-line" style="accent-color:var(--accent)">
        線を検知
      </label>
    </div>

    <!-- 描画サイズ -->
    <div class="panel-section">
      <div class="panel-label">描画サイズ</div>
      <div class="brush-size-row">
        <input type="range" id="brush-slider" min="1" max="10" value="1" step="1">
        <span class="brush-size-val" id="brush-val">1</span>
      </div>
    </div>

    <!-- グリッドサイズ -->
    <div class="panel-section">
      <div class="panel-label">グリッドサイズ</div>
      <div class="size-presets">
        <button class="preset-btn" data-size="8">8</button>
        <button class="preset-btn" data-size="16">16</button>
        <button class="preset-btn active" data-size="32">32</button>
        <button class="preset-btn" data-size="64">64</button>
        <button class="preset-btn" data-size="128">128</button>
        <button class="preset-btn" data-size="256">256</button>
      </div>
      <div class="size-row">
        <label>全体</label>
        <input type="range" id="both-slider" min="4" max="256" value="32" step="1">
        <input type="number" class="size-input" id="both-val" min="4" max="256" value="32">
      </div>
      <div class="size-row">
        <label>列</label>
        <input type="range" id="cols-slider" min="4" max="256" value="32" step="1">
        <input type="number" class="size-input" id="cols-val" min="4" max="256" value="32">
      </div>
      <div class="size-row">
        <label>行</label>
        <input type="range" id="rows-slider" min="4" max="256" value="32" step="1">
        <input type="number" class="size-input" id="rows-val" min="4" max="256" value="32">
      </div>
      <button id="btn-resize" style="width:100%; margin-top:4px;">適用</button>
    </div>

    <!-- カラー -->
    <div class="panel-section">
      <div class="panel-label">カラー</div>
      <div class="palette-grid" id="palette"></div>
      <input type="color" id="color-picker" value="#3a3a38">
    </div>

    <!-- 画像から変換 -->
    <div class="panel-section">
      <div class="panel-label">画像から変換</div>
      <div id="drop-zone">
        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
          <path d="M4 17v2a1 1 0 001 1h14a1 1 0 001-1v-2M12 4v12m-4-4l4-4 4 4"/>
        </svg>
        クリックまたは<br>ドロップで画像を選択
        <input type="file" id="file-input" accept="image/*" style="display:none">
      </div>
      <div style="margin-top:8px;">
        <div class="panel-label" style="margin-bottom:4px;">変換方式</div>
        <div class="method-row">
          <button class="method-btn active" data-method="mode">最頻色</button>
          <button class="method-btn" data-method="avg">平均色</button>
        </div>
        <button id="btn-convert" style="width:100%;" disabled>変換する</button>
      </div>
    </div>

    <!-- グリッド表示 -->
    <div class="panel-section">
      <div class="panel-label">表示</div>
      <label style="display:flex; align-items:center; gap:6px; cursor:pointer;">
        <input type="checkbox" id="show-grid" checked style="accent-color:var(--accent)">
        グリッド線を表示
      </label>
    </div>

  </div>

  <!-- リサイズハンドル -->
  <div class="panel-resize" id="panel-resize"></div>

  <!-- モバイル用背景オーバーレイ -->
  <div class="panel-backdrop" id="panel-backdrop"></div>

  <!-- パネル開閉ボタン -->
  <button class="panel-toggle" id="panel-toggle" title="パネルの表示切替">◀</button>

  <!-- キャンバスエリア -->
  <div class="canvas-area" id="canvas-area">
    <div class="canvas-scroll-pad">
      <div id="canvas-wrap">
        <canvas id="canvas-bg"></canvas>
        <canvas id="canvas-main"></canvas>
        <canvas id="canvas-overlay"></canvas>
      </div>
    </div>

    <!-- スタートオーバーレイ -->
    <div id="start-overlay">
      <div class="start-card">
        <div style="font-size:15px; font-weight:500;">はじめましょう</div>
        <p>白紙から描くか、<br>画像をドット絵に変換できます</p>
        <div class="start-actions">
          <button id="btn-new" class="primary">白紙で始める</button>
          <button id="btn-load-img" onclick="document.getElementById('file-input').click()">画像を読み込む</button>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- 色履歴（描画エリア左下固定） -->
<div class="color-history" id="color-history">
  <div class="color-dot dot-xs" id="dot-4" title="4つ前の色"></div>
  <div class="color-dot dot-small" id="dot-3" title="3つ前の色"></div>
  <div class="color-dot dot-medium" id="dot-2" title="2つ前の色"></div>
  <div class="color-dot dot-large" id="dot-1" title="1つ前の色"></div>
  <div class="color-dot dot-xl" id="dot-0" title="現在の色"></div>
</div>

<!-- ズーム（画面右下固定） -->
<div class="zoom-controls">
  <button id="btn-zoom-out">−</button>
  <span id="zoom-label">100%</span>
  <button id="btn-zoom-in">＋</button>
</div>

<!-- ステータスバー -->
<div class="statusbar">
  <span>位置: <b id="stat-pos">—</b></span>
  <span>色: <b id="stat-color">—</b></span>
  <span>グリッド: <b id="stat-grid">32×32</b></span>
</div>

<script src="script.js"></script>
</body>
</html>
